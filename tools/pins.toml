# Human-reviewable pin source of truth. `tools/verify-pins.py` enforces these.
# A branch name or short SHA is never an acceptable pin.

[toolchain]
rust_channel = "1.96.0"
edition = "2024"
components = ["rustfmt", "clippy"]

[ncp]
# Immutable NCP baseline. Haldir keeps stable semantic types and the optional
# exact adapter compiles the upstream crate at this revision.
tag = "v0.8.0"
commit = "2f5bd586d4bb20c90362bb6f5698b7f64057ba4e"
wire_version = "0.8"
contract_hash = "d1b50a2d8a265276"
# sha256 of proto/ncp.proto at v0.8.0, measured locally on 2026-07-12.
proto_sha256 = "6f13b12cff76e12fef384f691d11e2944db1f676568c3e780d3f975689131227"
command_vector_sha256 = "3e3d73235fe2dd4288158c29f9cd2f3f17034f7a58d803682f45c145a9733f2e"
command_schema_sha256 = "abd9743323e4f6eabdbc27888704462b1b1fd128777422b35146605709a01344"
enabled_increment = 1
capability_profile = "PRE_AUTHORITY_ACL_ONLY"

[zenoh]
# Exact NCP v0.8 transport baseline. Haldir compiles only the TLS link; the
# live transport feature itself remains off by default.
version = "1.9.0"
default_features = false
features = ["transport_tls"]

[live_transport]
# Official Rust 1.96.0 Bookworm multi-platform index used only to compile and
# run the disposable receiver-observed ACL probe inside the Docker network.
probe_builder_image = "docker.io/library/rust@sha256:5e2214abe154fe26e39f64488952e5c991eeed1d6d6da7cc8381ae83927f0cfc"
# Exact router image is duplicated from the source profile so pin verification
# can reject a harness/profile split before a live campaign is attempted.
router_image = "docker.io/eclipse/zenoh@sha256:157965d71e0bfd0a044d76a985ff0e5c306ad3968929168fb9678cd2a7fec23f"

[dependencies]
# All pinned in Cargo.lock; justification in docs/DEPENDENCY-RATIONALE.md.
ed25519-compact = "2.2"
sha2 = "0.10"
zeroize = "1"
subtle = "2"
getrandom = "0.2"
proptest = "1"
ncp-core = "0.8.0@2f5bd586d4bb20c90362bb6f5698b7f64057ba4e"
serde_json = "1.0"
hmac = "0.12.1"
tokio = "1"
zenoh = "1.9.0"

[formal]
# Exact release asset used by the formal workflow. The workflow verifies this
# digest before executing the jar; moving `latest` URLs are forbidden.
tla_tools_version = "1.7.4"
tla_tools_sha256 = "936a262061c914694dfd669a543be24573c45d5aa0ff20a8b96b23d01e050e88"
