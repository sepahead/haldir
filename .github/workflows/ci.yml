name: ci

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Every third-party Action is pinned to an immutable commit SHA (CL-CI-02). The
# trailing version comment keeps the reviewed release human-readable.

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # The pinned toolchain + components come from rust-toolchain.toml. `rustup show`
      # installs and selects it; we then verify (H-B01: the previous single-line
      # `--component rustfmt clippy` mis-parsed `clippy` as a positional toolchain).
      - name: Install + verify pinned toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal --component rustfmt --component clippy
          rustup show active-toolchain
          rustc -Vv
          cargo -V
      - name: Cache cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Tests
        run: cargo test --workspace --all-targets --all-features --locked
      - name: Doc tests
        run: cargo test --workspace --doc --locked
      - name: Docs build (deny warnings)
        run: cargo doc --workspace --no-deps --all-features --locked
        env:
          RUSTDOCFLAGS: "-D warnings"
      - name: git diff --check
        run: git diff --check
      - name: No generated-file drift
        run: python3 tools/verify-generated.py

  feature-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --component clippy
      # Prove the workspace compiles with minimal / no-default features too.
      - name: Build no-default-features
        run: cargo build --workspace --no-default-features --locked
      - name: Clippy default features only
        run: cargo clippy --workspace --locked -- -D warnings

  macos-compile:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --component clippy
      - name: Build + test on macOS
        run: cargo test --workspace --locked

  clean-build:
    # Deliberately no restored target cache: catches warm-cache assumptions and
    # undeclared generated artifacts (runbook Phase 1 step 7).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install toolchain
        run: rustup toolchain install 1.96.0 --profile minimal
      - name: Cold build
        run: cargo build --workspace --locked

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify source pins
        run: python3 tools/verify-pins.py
      - name: Verify immutable CI and formal-tool pins
        run: python3 tools/verify-ci-pins.py
      - name: Verify evidence layout
        run: python3 tools/verify-evidence.py
      - name: Forbidden-claim drift check
        run: python3 tools/verify-claims.py
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20

  interop:
    # An independent (second-implementation) check of the COSE_Sign1 /
    # deterministic-CBOR wire format (CL-INTEROP-01). Re-emits the vectors from
    # Rust, fails on any drift from the committed file, then verifies every
    # vector with the dependency-free Python verifier.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pinned toolchain
        run: rustup toolchain install 1.96.0 --profile minimal
      - name: Regenerate interop vectors (drift check)
        run: |
          cargo run -q -p haldir-crypto --example emit_interop_vectors > /tmp/vectors.json
          diff -u tools/interop/vectors.json /tmp/vectors.json
      - name: Independently verify COSE/CBOR vectors
        run: python3 tools/interop/verify_cose.py tools/interop/vectors.json
