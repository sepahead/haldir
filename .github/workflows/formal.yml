name: formal

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  tlc-model-check:
    runs-on: ubuntu-latest
    env:
      TLA_TOOLS_VERSION: "1.7.4"
      TLA_TOOLS_SHA256: "936a262061c914694dfd669a543be24573c45d5aa0ff20a8b96b23d01e050e88"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up JRE
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
      - name: Fetch pinned TLA+ tools
        run: |
          curl --fail --silent --show-error --location --retry 3 \
            --output tla2tools.jar \
            "https://github.com/tlaplus/tlaplus/releases/download/v${TLA_TOOLS_VERSION}/tla2tools.jar"
          echo "${TLA_TOOLS_SHA256}  tla2tools.jar" | sha256sum --check --strict
      - name: Model-check HaldirAuthority
        run: |
          java -XX:+UseParallelGC -cp tla2tools.jar tlc2.TLC \
            -workers auto \
            -config formal/HaldirAuthority.cfg \
            formal/HaldirAuthority.tla | tee tlc.log
          grep -q "Model checking completed. No error has been found." tlc.log
      - name: Upload TLC log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tlc-log
          path: tlc.log
